name: deploy-backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: 323336951250.dkr.ecr.us-east-1.amazonaws.com/sentiment-analyzer
  LAMBDA_FUNCTION: sentiment-analyzer
  FUNCTION_URL: https://3dffhy342e747dnzwhsjexqk4u0brusk.lambda-url.us-east-1.on.aws/

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ env.ECR_REPOSITORY }}:latest

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION" \
            --image-uri "$ECR_REPOSITORY:${{ github.sha }}"

      - name: Wait for Lambda update
        run: aws lambda wait function-updated-v2 --function-name "$LAMBDA_FUNCTION"

      - name: Smoke test
        run: |
          set -uo pipefail
          smoke() {
            curl -sS -o /tmp/resp.json -w "%{http_code}" \
              -X POST "$FUNCTION_URL" \
              -H 'content-type: application/json' \
              -d '{"text":"smoke test from CI"}' \
              --max-time 90
          }
          # First post-update invocation can 502: a fresh image pull onto a
          # Lambda host that doesn't yet have it cached can exceed the
          # function's 30 s timeout (Phase 2 deviation #7). The image is
          # cached on the host regardless, so a subsequent call only pays
          # init cost (~10 s warm init) and falls inside the timeout.
          for attempt in 1 2 3; do
            RESP=$(smoke)
            [ "$RESP" = "200" ] && break
            echo "attempt $attempt: HTTP $RESP"
            cat /tmp/resp.json; echo
            [ "$attempt" -lt 3 ] && sleep 15
          done
          if [ "$RESP" != "200" ]; then
            echo "smoke failed after 3 attempts"
            exit 1
          fi
          jq -e '.sentiment.label and .emotions and .keywords' /tmp/resp.json
