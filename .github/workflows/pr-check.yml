name: pr-check

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pr-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Vitest
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright e2e
        run: npm run e2e

      - name: Production build smoke
        env:
          VITE_LAMBDA_URL: https://3dffhy342e747dnzwhsjexqk4u0brusk.lambda-url.us-east-1.on.aws/
        run: npm run build
